{% if user.is_authenticated %}
  <header class="topbar">
    <button class="btn btn-icon d-lg-none" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Abrir menú">
      <i class="bi bi-list"></i>
    </button>

    <button class="btn btn-icon d-none d-lg-inline-flex" type="button"
            data-sidebar-toggle aria-label="Contraer menú">
      <i class="bi bi-layout-sidebar-inset"></i>
    </button>

    <div class="topbar-title">
      <span class="eyebrow">Sistema SySO</span>
      <strong>{% block topbar_title %}Panel de gestión{% endblock %}</strong>
    </div>

    <div class="ms-auto d-flex align-items-center gap-2">
      {% if user.is_staff %}
        <a href="/admin/" class="btn btn-light btn-sm d-none d-md-inline-flex align-items-center gap-2">
          <i class="bi bi-gear"></i>
          Admin
        </a>
      {% endif %}

      <div class="dropdown">
        <button class="btn account-button dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <span class="account-avatar">{{ user.username|first|upper }}</span>
          <span class="d-none d-sm-inline">{{ user.get_full_name|default:user.username }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li>
            <a class="dropdown-item" href="{% url 'auth:profile' %}">
              <i class="bi bi-person me-2"></i>Mi perfil
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="{% url 'auth:change_password' %}">
              <i class="bi bi-key me-2"></i>Cambiar contraseña
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <form action="{% url 'auth:logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="dropdown-item text-danger">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </header>
{% else %}
  <nav class="navbar navbar-expand-lg public-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-shield-check"></i> SySO Construcción
      </a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="{% url 'auth:login' %}">Iniciar sesión</a>
        <a class="btn btn-primary btn-sm" href="{% url 'auth:register' %}">Registrarse</a>
      </div>
    </div>
  </nav>
{% endif %}
